<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIX Vela Canlı Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #1a1a1a;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 2rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.06);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .brand-sub {
      font-size: 12px;
      color: #7b7b7b;
      margin-top: 2px;
    }

    .version-tag {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      color: #8b6b2c;
      background: #f7efe0;
      border: 1px solid #ead7ad;
      border-radius: 999px;
      padding: 4px 8px;
    }

    .field-label {
      font-size: 12px;
      color: #666;
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .field-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .field-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 11px 12px 11px 38px;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fafafa;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    input:focus {
      border-color: #bbb;
      background: #fff;
    }

    .divider {
      border: none;
      border-top: 1px solid #efefef;
      margin: 1.25rem 0;
    }

    .call-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s ease, transform 0.1s ease;
      margin-top: 4px;
    }

    .call-btn:hover {
      opacity: 0.88;
    }

    .call-btn:active {
      transform: scale(0.98);
    }

    .call-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      margin-top: 12px;
      display: none;
      line-height: 1.5;
    }

    .status.success {
      display: block;
      background: #f0faf4;
      color: #1a7a4a;
      border: 1px solid #b7e4ca;
    }

    .status.error {
      display: block;
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
    }

    .pulse {
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand-row">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8" stroke="#fff" stroke-width="1.5"/>
          <path d="M7 8c0-1.66 1.34-3 3-3s3 1.34 3 3c0 1.3-.83 2.4-2 2.82V13H9v-2.18C7.83 10.4 7 9.3 7 8z" fill="#fff"/>
          <rect x="9" y="14" width="2" height="1.5" rx="0.5" fill="#fff"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">BIX Vela Canlı Demo</div>
        <div class="brand-sub">VAPI ile anlık arama tetikleme</div>
        <div class="version-tag">v2 - yeni assistant testi</div>
      </div>
    </div>

    <div>
      <label class="field-label">İsim Soyisim</label>
      <div class="field-wrap">
        <span class="field-icon">👤</span>
        <input type="text" id="name" placeholder="Ahmet Yılmaz" />
      </div>
    </div>

    <div>
      <label class="field-label">Telefon Numarası</label>
      <div class="field-wrap">
        <span class="field-icon">📞</span>
        <input type="tel" id="phone" placeholder="+905xxxxxxxxx" />
      </div>
    </div>

    <div>
      <label class="field-label">E-posta</label>
      <div class="field-wrap">
        <span class="field-icon">✉️</span>
        <input type="email" id="email" placeholder="ahmet@example.com" />
      </div>
    </div>

    <hr class="divider" />

    <button class="call-btn" id="call-btn" onclick="initiateCall()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3.5 2C3.5 1.72 3.72 1.5 4 1.5h2.5a.5.5 0 0 1 .49.39l.75 3.5a.5.5 0 0 1-.27.56L5.96 6.8c.6 1.32 1.62 2.34 2.94 2.94l.85-1.51a.5.5 0 0 1 .56-.27l3.5.75a.5.5 0 0 1 .39.49V12c0 .28-.22.5-.5.5A10.5 10.5 0 0 1 3 2.5.5.5 0 0 1 3.5 2z" fill="white"/>
      </svg>
      Şimdi Ara
    </button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const APP_VERSION = "bix-vela-v2";
    const VAPI_API_KEY = "41d9805e-beec-4abb-972d-bf53984740bd";
    const ASSISTANT_ID = "2b83b987-a040-442f-bc7e-5b092ec573f1";
    const PHONE_NUMBER_ID = "9486f46a-0172-45df-986c-84922121bb1d";

    async function initiateCall() {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();
      const btn = document.getElementById("call-btn");
      const status = document.getElementById("status");

      status.className = "status";
      status.textContent = "";

      if (!name || !phone || !email) {
        status.className = "status error";
        status.textContent = "Lütfen tüm alanları doldurun.";
        return;
      }

      const firstName = name.split(" ")[0] || name;

      btn.disabled = true;
      btn.innerHTML = '<span class="pulse">⬤</span> Aranıyor...';

      const payload = {
        assistantId: ASSISTANT_ID,
        phoneNumberId: PHONE_NUMBER_ID,
        customer: {
          number: phone,
          name: name
        },
        assistantOverrides: {
          variableValues: {
            name: firstName,
            email: email,
            phone: phone
          }
        },
        metadata: {
          source: "github-pages-demo",
          version: APP_VERSION
        }
      };

      console.log("Using assistant:", ASSISTANT_ID);
      console.log("Payload:", payload);

      try {
        const res = await fetch("https://api.vapi.ai/call", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + VAPI_API_KEY
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        console.log("Vapi response:", data);

        if (!res.ok) {
          throw new Error(data.message || JSON.stringify(data));
        }

        status.className = "status success";
        status.textContent = "✓ Arama başlatıldı. " + phone + " numarası şimdi aranıyor.";
      } catch (err) {
        console.error(err);
        status.className = "status error";
        status.textContent = "Hata: " + err.message;
      } finally {
        btn.disabled = false;
        btn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3.5 2C3.5 1.72 3.72 1.5 4 1.5h2.5a.5.5 0 0 1 .49.39l.75 3.5a.5.5 0 0 1-.27.56L5.96 6.8c.6 1.32 1.62 2.34 2.94 2.94l.85-1.51a.5.5 0 0 1 .56-.27l3.5.75a.5.5 0 0 1 .39.49V12c0 .28-.22.5-.5.5A10.5 10.5 0 0 1 3 2.5.5.5 0 0 1 3.5 2z" fill="white"/>
          </svg>
          Şimdi Ara
        `;
      }
    }
  </script>
</body>
</html>
